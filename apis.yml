apis:
- aid: gravatar:avatar-api
  name: Gravatar Avatar API
  description: Public CDN-based API for fetching user avatars by SHA256 email hash.
    Supports image size customization, default image fallbacks, and content rating
    filters. Avatar requests do not count against rate limits.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.gravatar.com/api/avatars/
  baseURL: https://0.gravatar.com
  tags:
  - Avatars
  - Images
  - CDN
  properties:
  - type: Documentation
    url: https://docs.gravatar.com/api/avatars/
  - type: OpenAPI
    url: https://api.gravatar.com/v3/openapi
- aid: gravatar:rest-api
  name: Gravatar REST API
  description: REST API (v3) for retrieving and managing Gravatar user profiles, avatars,
    QR codes, and verified account lookups by SHA256 email hash or profile slug. Supports
    API key (Bearer token) and WordPress OAuth2 authentication. Unauthenticated requests
    are limited to 100/hour; authenticated requests receive 1,000/hour.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.gravatar.com/rest-api/
