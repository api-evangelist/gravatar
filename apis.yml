aid: gravatar
name: Gravatar
description: Gravatar (Globally Recognized Avatar) is a service that provides universally
  recognized avatars and rich identity profiles tied to email addresses via SHA256
  hash. Developers can fetch user avatars, profile information, verified social accounts,
  and identity data using a REST API with API key or OAuth authentication. The service
  offers both a public avatar CDN (no auth required) and a REST API (v3) for profiles,
  avatar management, QR codes, and verified account lookups.
